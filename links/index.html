  <style>
    /* When add/edit modal is open, disable FAB */
    body.modal-add-open .fab {
      display: none !important;
    }
    /* Prevent body from scrolling when modal open */
    body.modal-add-open { overflow: hidden; }

    /* Ensure main content sits below the fixed header (uses --hdr-h set by script) */
    .wrap {
      box-sizing: border-box;
      padding-top: calc(var(--hdr-h, 72px) + 16px);
    }
  </style>
    <script>
    (function(){
      let lastH = 0;
      let scheduled = false;
      function updateHeaderHeight(){
        try{
          const header = document.querySelector('header.card');
          if(!header) return;
          const h = header.offsetHeight || 0;
          if(h === lastH) return;
          lastH = h;
          document.documentElement.style.setProperty('--hdr-h', h + 'px');
        }catch(e){console.warn('updateHeaderHeight failed', e)}
      }
      function scheduleUpdate(){ if(scheduled) return; scheduled = true; requestAnimationFrame(()=>{ scheduled = false; updateHeaderHeight(); }); }
      updateHeaderHeight();
      window.addEventListener('resize', scheduleUpdate);
      window.addEventListener('orientationchange', scheduleUpdate);
      if(window.visualViewport){
        try{
          visualViewport.addEventListener('resize', scheduleUpdate);
          // avoid reacting to visualViewport.scroll to prevent layout thrash on mobile
        }catch(e){}
      }
      window.addEventListener('load', ()=> setTimeout(scheduleUpdate,120));
    })();
    </script>

  <script>
  // オーナーであれば常に右下にFABを表示する（mobile Safariのsafe-area考慮）
  (function(){
    const fab = document.getElementById('openAdd');
    if(!fab) return;

    function applyVisible(visible){
      try{
        if(visible){
          fab.style.display = 'flex';
          fab.setAttribute('aria-hidden','false');
        }else{
          fab.style.display = 'none';
          fab.setAttribute('aria-hidden','true');
        }
      }catch(e){ /* ignore */ }
    }

    // 初期は非表示、linklocal.js 側でグローバル変数 `isReadOnlyMode` を設定します。
    applyVisible(false);

    // 変化をポーリングで監視（linklocal.js の処理が完了したら反映される）
    let last;
    const iv = setInterval(()=>{
      let v;
      try{
        if(typeof isReadOnlyMode === 'boolean') v = isReadOnlyMode; // top-level let を参照
        else if(typeof window.isReadOnlyMode === 'boolean') v = window.isReadOnlyMode; // もし var で公開されている場合
      }catch(e){ v = undefined; }
      if(typeof v === 'boolean' && v !== last){
        last = v;
        // オーナーなら編集可能 (= false の場合) として表示
        applyVisible(!v);
        // 値が確定したらポーリングは不要
        clearInterval(iv);
      }
    }, 250);

    // バックアップ: 30秒後に強制停止
    setTimeout(()=> clearInterval(iv), 30000);
  })();
  </script>

    <h3 id="hubCreateTitle">ハブを作成</h3>
    <div class="form-row">
      <label>ルーム名（任意）</label>
      <input id="hubNameInput" type="text" placeholder="例: メモ共有" />
    </div>
    <div class="form-row">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <label style="margin:0;">テキスト（必須）</label>
        <button id="hubTextPasteBtn" class="small-btn" type="button" style="font-size:13px;padding:6px 12px;">📋 クリップボードからペースト</button>
      </div>
      <textarea id="hubTextInput" rows="5" placeholder="共有するテキストを入力..." style="width:100%;box-sizing:border-box;"></textarea>
    </div>
    <div class="form-row">
      <label>パスワード（必須）</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="hubPasswordInput" type="text" placeholder="閲覧用パスワード" class="hub-pw-masked" autocomplete="new-password" style="flex:1;" />
        <button id="hubPasswordToggle" class="small-btn" type="button" style="flex-shrink:0;">👁️</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
      <button id="hubCreateCancel" class="small-btn" type="button">キャンセル</button>
      <button id="hubCreateSave" class="open-btn" type="button">作成</button>
    </div>
  </div>
</div>

<!-- Hub View Modal (password prompt + text display) -->
<div class="modal" id="hubViewModal" role="dialog" aria-modal="true" style="display:none;">
  <div class="panel" role="document" style="max-width:420px;">
    <h3 id="hubViewTitle">ハブを表示</h3>
    <div id="hubViewPasswordSection">
      <div class="form-row">
        <label>パスワードを入力</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input id="hubViewPasswordInput" type="text" placeholder="パスワード" class="hub-pw-masked" autocomplete="off" style="flex:1;" />
          <button id="hubViewPasswordToggle" class="small-btn" type="button" style="flex-shrink:0;">👁️</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
        <button id="hubViewCancel" class="small-btn" type="button">閉じる</button>
        <button id="hubViewUnlock" class="open-btn" type="button">解錠</button>
      </div>
    </div>
    <div id="hubViewTextSection" style="display:none;">
      <div class="hub-text-display" id="hubViewTextContent"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
        <button id="hubViewCopyBtn" class="small-btn" type="button">コピー</button>
        <button id="hubViewCloseBtn" class="small-btn" type="button">閉じる</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
